[workspace]
authors = ["Evan Foster <evanfost@andrew.cmu.edu>"]
channels = [
  "robostack-humble", "conda-forge",
  "https://prefix.dev/robostack-humble-realsense-camera-osx" # allows for pulling realsense libraries on macos
]
name = "LEAP-sprayer"
platforms = [{ name = "jetson-orin-nano", platform = "linux-aarch64", cuda = "12.6" }, "linux-64", "osx-arm64"]
version = "0.1.0"

[feature.source_ros2]
activation = { scripts = ["install/setup.sh"] }

[environments.sourced]
features = ["source_ros2"]

[tasks.build]
# these args could be in a colcon.meta file,
# but let's not just so the project probably should build without pixi
# e.g. {"names": {"*": {"cmake-args": ["-DPython_ROOT_DIR=$CONDA_PREFIX","-DPython_FIND_STRATEGY=LOCATION"]}}}
# the RPATH flag cleans up some annoying errors on macOS
# -Wno-dev suppresses warnings that come up out of outdated ROS2 cmake stuff we can't fix
# --no-warn-unused-cli suppresses "manually specified variables not used" warning
# that comes out of ros
cmd = """
    colcon build --symlink-install \
    --cmake-args \
      -DPython_ROOT_DIR="$CONDA_PREFIX" \
      -DPython_FIND_STRATEGY=LOCATION \
      -DCMAKE_BUILD_WITH_INSTALL_RPATH=TRUE \
      -Wno-dev \
      --no-warn-unused-cli
"""
inputs = ["src"]
outputs = ["build", "install"]

[tasks.launch]
cmd = """
{% if not pixi.is_linux %}\
echo \"WARNING: not all features work on non-Linux platforms\" && \
{% endif %}\
ros2 launch bringup launch.py
"""
depends-on = [{task = "build"}]
default-environment = "sourced"

[tasks.pkg-create]
args = ["package", "name"]
cmd = "ros2 pkg create --build-type ament_python --destination-directory src --node-name {{ name }} {{ package }}"

[dependencies]
python = "~=3.11.0"
ros-humble-desktop = ">=0.10.0,<0.11"
colcon-common-extensions = ">=0.3.0,<0.4"
setuptools = "<=58.2.0"
ros-humble-vision-opencv = ">=3.2.1,<4"
opencv = ">=4.11.0,<5"
ros-humble-rqt-image-view = ">=1.2.0,<2"
ros-humble-realsense2-camera = ">=4.55.1,<5"
ros-humble-foxglove-bridge = ">=0.8.5,<0.9"
ros-humble-vision-msgs = ">=4.1.1,<5"
ros-humble-foxglove-msgs = ">=2.3.0,<3"
ros-humble-message-filters = ">=4.3.7,<5"
pyserial = ">=3.5,<4"
ros-humble-rviz2 = ">=11.2.18,<12"
xacro = ">=2.1.1,<3"
ros-humble-realsense2-description = ">=4.55.1,<5"

# embedded firmware development

# used for arduino development and deployment
[feature.firmware.dependencies]
platformio = "~=6.1.19"

[environments.firmware]
features = ["firmware"]
# disable default imports (we don't need ros2 in this)
no-default-feature = true

[feature.firmware.tasks.build-firmware]
default-environment = "firmware"
args = [
    { arg = "controller", "default" = "test_led", "choices" = ["test_led", "live"] },
    { arg = "do_upload", "default" = "no_upload", "choices" = ["no_upload", "upload"] }
]
cmd = """
    cd firmware/solenoid_controller/ && \
    platformio run -e {{ controller }} {% if do_upload == 'upload' %}--target upload{% endif %}
    """

[feature.check.dependencies]
ruff = "*"

[environments.check]
features = ["check"]

[feature.check.tasks.check]
default-environment = "check"
args = [
    # if fix is false, don't run format, unless format is explicitly true
    # if fix is true, run format unless explicity false
    { arg = "fix", default = "no_fix", choices = ["fix", "no_fix"] },
    { arg = "format", default = "", choices = ["", "reformat", "no_reformat"] }
]
cmd = """
    ruff format src/ \
    {% if format != 'reformat' and not (fix == 'fix' and format == '') %}\
    --check \
    {% endif %}\
    && \
    ruff check {% if fix == 'fix' %}--fix {% endif %}src/
    """
